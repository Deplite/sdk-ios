name: ci

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - run: swift build
      - run: swift test
